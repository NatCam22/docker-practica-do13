<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de conexión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
    }
    .back {
      display: inline-block;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .back:hover { color: #e2e8f0; }
    h1 { font-size: 1.4rem; margin-bottom: 1.8rem; color: #f8fafc; }
    label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    .row { display: flex; gap: 0.8rem; }
    .row .field { flex: 1; }
    button[type="submit"] {
      margin-top: 1.8rem;
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="{{ url_for('index') }}">← Volver</a>
    <h1>📝 Datos de conexión</h1>

    {% if error %}
      <div style="background:#450a0a;color:#fca5a5;border-radius:8px;padding:0.7rem 1rem;margin-bottom:1.2rem;font-size:0.83rem;">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('connect_form') }}" method="POST">
      <div class="row">
        <div class="field">
          <label for="host">Host</label>
          <input type="text" id="host" name="host" value="db" required>
        </div>
        <div class="field">
          <label for="port">Puerto</label>
          <input type="number" id="port" name="port" value="5432" required>
        </div>
      </div>

      <label for="dbname">Base de datos</label>
      <input type="text" id="dbname" name="dbname" value="mydb" required>

      <label for="user">Usuario</label>
      <input type="text" id="user" name="user" value="admin" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Conectar</button>
    </form>
  </div>
</body>
</html>
